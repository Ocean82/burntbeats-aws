server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;

  # Static SPA — sensible defaults (tune CSP if you add third-party scripts beyond Stripe/Clerk)
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Proxy backend API through the same origin so the browser only needs
  # access to 80/443 (matches EC2 security group).
  location ^~ /api/ {
    proxy_pass http://backend:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Forward client scheme from ALB/Cloudflare. Do not use $scheme here — behind TLS termination nginx sees only HTTP.
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_request_buffering off;
    client_max_body_size 200M;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

