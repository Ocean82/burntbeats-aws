name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Frontend npm audit
        working-directory: frontend
        run: npm audit --audit-level=high
      - name: Frontend build
        working-directory: frontend
        run: npm run build
      - name: Frontend critical unit tests
        working-directory: frontend
        run: npm run test:run -- src/utils/tokenCost.test.ts src/hooks/useExport.test.ts

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Backend npm audit
        working-directory: backend
        run: npm audit --audit-level=high
      - name: Backend lint
        working-directory: backend
        run: npm run lint
      - name: Backend health smoke
        working-directory: backend
        run: |
          set -euo pipefail
          export PORT=3001
          export STEM_SERVICE_URL=http://localhost:5000
          node server.js &
          pid=$!
          trap "kill $pid >/dev/null 2>&1 || true" EXIT
          sleep 2
          curl -fsS http://localhost:3001/api/health | cat

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python syntax smoke
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff
          python -m py_compile stem_service/server.py
          ruff check stem_service --select E9,F63,F7,F82 --quiet
      - name: Python requirements lock drift check
        run: |
          python scripts/check_stem_requirements_lock_sync.py
      - name: Python stem dependency smoke
        run: |
          python -m pip install numpy soundfile "pedalboard>=0.9.0"
          python -c "import stem_service.pitch_shift as m; print(m.__name__)"
      - name: Install stem_service locked deps (CPU PyTorch)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libsndfile1
          python -m pip install -r stem_service/requirements.lock.txt \
            --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Torchaudio I/O smoke
        run: python scripts/smoke_torchaudio_io.py
      - name: Stem service unit tests
        env:
          STEM_ALLOW_MISSING_HTDEMUCS: "1"
        run: python -m pytest stem_service/tests -q

  stem-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build stem_service image
        run: docker build -f stem_service/Dockerfile .

  backend-docker-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image (clean context)
        run: docker build -f backend/Dockerfile backend
      - name: Verify backend production deps in container
        run: |
          set -euo pipefail
          cid="$(docker create burntbeats-backend:latest)"
          trap "docker rm -f \"$cid\" >/dev/null 2>&1 || true" EXIT
          docker cp "$cid:/app/package.json" /tmp/backend-package.json
          docker cp "$cid:/app/node_modules/@clerk/express/package.json" /tmp/clerk-express.json
          docker cp "$cid:/app/node_modules/multer/package.json" /tmp/multer.json
          node -e "const p=require('/tmp/backend-package.json'); const c=require('/tmp/clerk-express.json').version; const m=require('/tmp/multer.json').version; const semver=(range,v)=>range.replace(/^[~^]/,'').split('.').slice(0,2).join('.')===v.split('.').slice(0,2).join('.'); if(!semver(p.dependencies['@clerk/express'],c)){console.error('clerk version mismatch',p.dependencies['@clerk/express'],c); process.exit(1);} if(!semver(p.dependencies['multer'],m)){console.error('multer version mismatch',p.dependencies['multer'],m); process.exit(1);} console.log('backend docker deps OK:',c,m);"

