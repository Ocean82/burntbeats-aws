name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Frontend npm audit
        working-directory: frontend
        run: npm audit --audit-level=critical
      - name: Frontend tests
        working-directory: frontend
        run: npm run test:run

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Backend npm audit
        working-directory: backend
        run: npm audit --audit-level=critical
      - name: Backend lint
        working-directory: backend
        run: npm run lint
      - name: Backend health smoke
        working-directory: backend
        run: |
          set -euo pipefail
          export PORT=3001
          export STEM_SERVICE_URL=http://localhost:5000
          node server.js &
          pid=$!
          trap "kill $pid >/dev/null 2>&1 || true" EXIT
          sleep 2
          curl -fsS http://localhost:3001/api/health | cat

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python syntax smoke
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff
          python -m py_compile stem_service/server.py
          ruff check stem_service --select E9,F63,F7,F82 --quiet

