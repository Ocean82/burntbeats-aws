last_updated: 2026-03-05
purpose: Align AGENT-Knowledge-Block, AGENT-decision-knowledge-context with the stem splitter implementation. Ensure models live only under the project; no links to external paths.

policy_no_external_links:
  - Runtime and deployment: All model paths used by the app must resolve to files inside the repo root. No symlinks or reparse points from models/ to external paths.
  - Agent bank as copy source only: Stem-models directory (e.g. in WSL /mnt/d/DAW Collection/stem-models) is import source only. Copy files into repo models/ using scripts/copy-models.sh. Never reference external paths from code or config.
  - WSL only: All run and copy commands are bash; no Windows or PowerShell. App does not support running natively on Windows.

where_models_resolved_in_code:
  - stem_splitter.py: Root used Path(__file__).resolve().parent.parent = repo root, Path models/, models/htdemucs.pth
  - mdx_onnx.py: Root used Path(__file__).resolve().parent.parent.parent = repo root, Path models/MDX_Net_Models/, models/mdxnet_models/, models/*.onnx
  - No hardcoded D:\ or stem-models in code. All paths are relative to the repo.

agent_capability_implementation_mapping:
  - karaoke_high_quality (isolate_vocals → instrumental_bleedless): Hybrid: Stage 1 ONNX vocal + phase inversion + Stage 2 Demucs, Models used MDX-Net ONNX (Kim_Vocal_2, Voc_FT, Inst_HQ_4/5) + htdemucs
  - mastering_safe_instrumental (instrumental_fullness): Demucs 4-stem on full mix or on Stage 1 instrumental, Models used htdemucs (models/htdemucs.pth or pretrained)
  - stem_expansion (4-stem): Demucs only or hybrid Stage 2, Models used htdemucs
  - The agent model registry (bs_roformer_2025_07, mel_roformer_fv7, hyperace_v2, karaoke_bs_anvuew) is decision context for a future agent layer. Those entries are GPU-heavy or PyTorch-only. The current server uses ONNX (Stage 1) + Demucs (Stage 2) to satisfy the same capabilities on CPU-only without depending on Roformer/ckpt models.

models_required_inside_project:
  - Demucs: models/htdemucs.pth (optional; if missing, Demucs uses pretrained download).
  - Stage 1 ONNX (at least one): One of: models/mdxnet_models/Kim_Vocal_2.onnx, models/mdxnet_models/UVR-MDX-NET-Voc_FT.onnx, models/MDX_Net_Models/UVR-MDX-NET-Inst_HQ_4.onnx, models/MDX_Net_Models/UVR-MDX-NET-Inst_HQ_5.onnx, or models/Kim_Vocal_2.onnx, models/UVR-MDX-NET-Inst_HQ_5.onnx (see mdx_onnx.VOCAL_MODEL_PATHS).
  - MDX config (for ONNX): models/MDX_Net_Models/model_data/model_data.json and, when referenced by hash, YAMLs under models/MDX_Net_Models/model_data/mdx_c_configs/. Fallback: models/mdxnet_models/model_data.json.
  - All of these must be real files under BEATS-DAW2\models. If you add or refresh from the agent bank, copy the files; do not link. See combined-plan-model-inventory.md for exact paths and copy sources.

verifying_no_symlinks:
  - WSL/Linux only: find models -type l (Should return nothing; use copies only, no symlinks.)

models_and_stem_count_faq:
  - Are other models in models/ more appropriate for this project? Current choice is appropriate for CPU-only: Stage 1 ONNX (Kim_Vocal_2, Voc_FT, Inst_HQ_4/5) + Stage 2 Demucs (htdemucs) is the right stack for no-GPU deployment. Other files in models/: Roformer (BS-Roformer-Viperx-1297, model_bs_roformer_ep_937_sdr_10.5309.ckpt), MDX23C ckpts, and silero_vad are either GPU-heavy or need different loaders. They are not wired in; keeping CPU-only means staying with ONNX + Demucs unless product direction changes.
  - Should any models be added for efficiency or quality? Optional improvements (not required): htdemucs_ft: For 4-stem, a fine-tuned Demucs variant can improve quality when available; would need to be added to the loader and models/. Stage 1 preference: Allow choosing Stage 1 ONNX by speed vs quality (e.g. env STEM_VOCAL_PREFER=quality|speed to prefer Inst_HQ vs Kim_Vocal_2). Not implemented yet.
  - Can the project split by user preference (e.g. 2 vs 4 stems)? Yes. The backend and API already support it: 2 stems: vocals + instrumental (Demucs sum or hybrid phase inversion). 4 stems: vocals, drums, bass, other (Demucs). API: POST /api/stems/split accepts form field stems = "2" or "4" (default "4"). Optional quality is forwarded to the Python service. UI: The Stem Split panel now exposes a stem-count control (2 or 4) and calls the split API; returned stems are added to the timeline (one stem per track, in order).

