version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://backend:3001}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY}
        VITE_STRIPE_PRICING_TABLE_ID: ${VITE_STRIPE_PRICING_TABLE_ID:-}
        VITE_STRIPE_CUSTOMER_PORTAL_URL: ${VITE_STRIPE_CUSTOMER_PORTAL_URL:-}
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: 3001
      STEM_SERVICE_URL: http://stem_service:5000
      STEM_OUTPUT_DIR: /app/tmp/stems
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:5173,http://localhost}
      REDIS_URL: ${REDIS_URL:-}
      API_KEY: ${API_KEY:-}
      JOB_TOKEN_SECRET: ${JOB_TOKEN_SECRET:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_ID_BASIC: ${STRIPE_PRICE_ID_BASIC:-}
      STRIPE_PRICE_ID_PREMIUM: ${STRIPE_PRICE_ID_PREMIUM:-}
      STRIPE_PRICE_ID_STUDIO: ${STRIPE_PRICE_ID_STUDIO:-}
      STRIPE_PRICE_ID_TOPUP: ${STRIPE_PRICE_ID_TOPUP:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      S3_PRESIGN_EXPIRES_SECONDS: ${S3_PRESIGN_EXPIRES_SECONDS:-3600}
      USAGE_TOKENS_ENABLED: ${USAGE_TOKENS_ENABLED:-1}
      USAGE_DEFAULT_TOKENS_PER_MONTH: ${USAGE_DEFAULT_TOKENS_PER_MONTH:-6000}
    volumes:
      - ./tmp/stems:/app/tmp/stems
    healthcheck:
      test: ["CMD", "node", "--input-type=module", "-e", "import http from 'http'; http.get('http://localhost:3001/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  stem_service:
    build:
      context: .
      dockerfile: stem_service/Dockerfile
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      STEM_OUTPUT_DIR: /repo/tmp/stems
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:5173,http://localhost}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-2}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-2}
      ONNXRUNTIME_NUM_THREADS: ${ONNXRUNTIME_NUM_THREADS:-2}
      S3_ENABLED: ${S3_ENABLED:-false}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PREFIX: ${S3_PREFIX:-stems}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_DELETE_LOCAL_AFTER_UPLOAD: ${S3_DELETE_LOCAL_AFTER_UPLOAD:-false}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    volumes:
      - ./tmp/stems:/repo/tmp/stems
      - ./models:/repo/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: "2.0"
