version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://backend:3001
    ports:
      - "5173:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      STEM_SERVICE_URL: http://stem_service:5000
      STEM_OUTPUT_DIR: /app/tmp/stems
      FRONTEND_ORIGINS: http://localhost:5173,http://localhost
      API_KEY: ""
    volumes:
      - ./tmp/stems:/app/tmp/stems

  stem_service:
    build:
      context: ./stem_service
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      STEM_OUTPUT_DIR: /app/tmp/stems
      FRONTEND_ORIGINS: http://localhost:5173,http://localhost
    volumes:
      - ./tmp/stems:/app/tmp/stems
      - ./models:/app/models
